version: '3.8'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: streamshare
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: streamshare
    ports: ['5432:5432']
    volumes: ['pgdata:/var/lib/postgresql/data']

  server:
    build: ./apps/server
    ports: ['4000:4000']
    depends_on: [db]
    env_file: ./apps/server/.env

  web:
    build: ./apps/web
    ports: ['3000:3000']
    depends_on: [server]

volumes:
  pgdata:
